<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TF</title>
  <link rel="stylesheet" href="/index.css" />
  <link rel="stylesheet" href="/app/styles/main_btns.css" />
</head>
<body>
  <header>
    <nav class="nav">
      <h1 class="logo">TopFilms</h1>

      <div class="unibrow">
          <div class="dropdown">
            <button class="sort_btn">Сортировка</button>
            <div class="sort_dropdown">
              <a href="#">А–Я</a>
              <a href="#">Я–А</a>
            </div>
          </div>
          <div class="search">
            <textarea id="search_field" placeholder="Поиск"></textarea>
          </div>
      </div>

      <div class="main_button">
        <button class="add_btn" id="add_btn">Добавить отзыв</button>
      </div>
    </nav>
  </header>

  <div class="main_content">
    <div class="empty" id="empty_state">
      <p class="no_items_text">Пока здесь ничего нет</p>
    </div>

    <div class="film_container hidden" id="filmContainer">
      <h2>Фильмы</h2>
      <ul class="tasks-list" id="moviesList"></ul>
    </div>
  </div>

  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">Добавить фильм</h3>
      
      <form id="filmform" class="film-form">
        <input
          type="text"
          name="title"
          placeholder="Название фильма"
          required
          />

        <input
          type="number"
          name="year"
          placeholder="Год"
          min="1888"
          max="2100"
          required
          />
        
        <input
          type="text"
          name="genre"
          placeholder="Жанр"
          required
          />

        <input
          type="number"
          name="rating"
          placeholder="Рейтинг 0-10"
          min="0"
          max="10"
          step="0.1"
          required
          />
      
        <div class="modal-buttons">
          <button type="button" class="modal-btn cancel-btn" id="cancelBtn">Отмена</button>
          <button class="modal-btn save-btn" id="saveBtn">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/app/scripts/main.js"></script>
</body>
</html>
